name: Weather Station CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install Sampler Dependencies
      run: |
        cd sampler
        npm install

    - name: Run Sampler Unit Tests
      run: |
        cd sampler
        npm test

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Run Sensor Simulation (5 seconds)
      run: |
        timeout 5s python sensor.py || true
